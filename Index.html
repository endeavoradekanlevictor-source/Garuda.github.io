<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garuda</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .container {<h1>GARUDA</h1>
            max-width: 700px;<p>Garuda rules supreme</p>
        }<a href="https://github.com/Garuda/Garuda.github.io" class="btn">View on GitHub</a>
        h1 {
            font-size: 3.5rem;
            margin-bottom: 15px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
        }
        p {
            font-size: 1.2rem;
            line-height: 1.6;
            opacity: 0.9;
            margin-bottom: 25px;
        }
        .btn {
            display: inline-block;
            padding: 12px 28px;
            background: white;
            color: #1e3c72;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .footer {
            margin-top: 40px;
            font-size: 0.9rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Garuda</h1>
        <p>Welcome to my GitHub Pages site. Built with HTML, CSS, and hosted for free on GitHub.</p>
        <a href="https://github.com" class="btn">View on GitHub</a>
        <div class="footer">
            © 2026 Garuda.github.io
        </div>
    </div>
</body>
</html>
